<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#166534">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23166534'/%3E%3Cpath d='M26 40 L15 12 Q32 4 49 12 L38 40 Q32 43 26 40 Z' fill='white'/%3E%3Cpath d='M29 39 L24 9 M35 39 L40 9' stroke='%23166534' stroke-width='3' fill='none'/%3E%3Crect x='24' y='44' width='16' height='11' rx='5.5' fill='white'/%3E%3C/svg%3E">
<title>Badminton</title>
<style>
  :root {
    --accent: #166534;
    --bg: #fafaf9;
    --line: #e7e5e4;
    --ink: #1c1917;
    --mut: #78716c;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  .wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px; }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 4px; display: flex; align-items: center; gap: 8px; }
  h1 .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); }
  .sub { margin: 0 0 20px; font-size: 14px; color: var(--mut); }
  a.app { display: block; border: 1px solid var(--line); background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 12px; text-decoration: none; color: inherit; }
  a.app:active { background: #f5f5f4; }
  a.app b { display: block; font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  a.app span { font-size: 14px; color: var(--mut); }
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="dot"></span>Badminton</h1>
  <p class="sub">Club tools. Pick an app.</p>

  <a class="app" href="grading/">
    <b>Player Grading</b>
    <span>Grade players across five skills on club night, band-first with A–E grades.</span>
  </a>

  <a class="app" href="coach/">
    <b>Session Coach</b>
    <span>Plan a kids' session: drill-court rotation maths, block timers, and a drill library.</span>
  </a>
</div>
<script>
// Mark this browser as having seen the hub; apps on this origin show
// an "All apps" back link when the flag is present.
try { localStorage.setItem("badminton-hub-v1", "1"); } catch {}
</script>
</body>
</html>
